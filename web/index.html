<!DOCTYPE html>
<html>
<head>
    <title>Admin Control</title>
    <meta charset="UTF-8">
    <style>
        /* Full screen background */
        html,body {
            height: 100vh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }

        /* Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, rgba(0, 32, 63, 0.8), rgba(0, 128, 0, 0.7));
            z-index: 0;
        }

        /* Card for admin link */
        .admin-card {
            position: relative;
            z-index: 1; /* above overlay */
            padding: 40px 60px;
            
           
        }

        .admin-card a {
            display: inline-block;
            padding: 15px 35px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            transition: all 0.3s ease;
        }

        .admin-card a:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.7);
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <a href="Admin.html">Admin Control</a>
    </div>

</body>
</html>
