<!DOCTYPE html>
<html>
    <head>
        <title>Upload Video</title>

        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea, #764ba2);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .upload-container {
                background: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 15px 30px rgba(0,0,0,0.25);
                text-align: center;
                width: 350px;
            }

            h2 {
                margin-bottom: 25px;
                color: #333;
            }

            input[type="file"] {
                margin-bottom: 20px;
            }

            input[type="submit"] {
                padding: 10px 20px;
                background: #1abc9c;
                color: white;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                transition: 0.3s;
            }

            input[type="submit"]:hover {
                background: #16a085;
            }
        </style>
    </head>
    <body>

        <div class="upload-container">
            <h1>Upload Video</h1>

            <form action="Upload" method="post" enctype="multipart/form-data">
                <input type="file" name="video" accept="video/mp4" required><br>
                <input type="submit" value="Upload">
            </form>
        </div>

    </body>
</html>
