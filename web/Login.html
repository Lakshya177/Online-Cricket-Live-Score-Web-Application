<!DOCTYPE html>
<html>
    <head>
        <title>Login Error</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial;
                background: #f2f2f2;
            }

            .error-box {
                padding: 30px 40px;
                text-align: center;
            }

            .error-box h2 {
                color: #e74c3c;
                margin-bottom: 20px;
            }

            .error-box a {
                display: inline-block;
                padding: 10px 20px;
                background: #3498db;
                color: white;
                text-decoration: none;
                border-radius: 5px;
            }

            .error-box a:hover {
                background: #2980b9;
            }
        </style>
    </head>
    <body>
        <div class="error-box">
            <h2>Email or password not match</h2>
            <a href="index.html">Back to Login</a>
        </div>
    </body>
</html>
