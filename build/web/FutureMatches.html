<!DOCTYPE html>
<html>
    <head>
        <title>Insert Future Match</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f2f2f2;
                margin: 0;
                padding: 0;
            }

            .header {
                display: flex;
                justify-content: space-between; /* IMPORTANT */
                align-items: center;
                padding: 15px 30px;
            }
            .title {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
                height: 10px;
            }


            .logout-btn {
                text-decoration: none;
                background: red;
                color: white;
                padding: 8px 15px;
                border-radius: 5px;
                font-weight: bold;
            }

            .container {
                width: 40%;
                margin: 40px auto;
                background: white;
                padding: 20px;
                box-shadow: 0px 0px 10px gray;
                border-radius: 8px;
            }

            h2 {
                text-align: center;
                color: #2c3e50;
            }

            input[type="date"],
            input[type="time"],
            input[type="text"] {
                width: 100%;
                padding: 8px;
                margin-top: 5px;
                margin-bottom: 15px;
                border: 1px solid gray;
                border-radius: 5px;
            }

            input[type="submit"] {
                width: 100%;
                padding: 10px;
                background: #27ae60;
                color: white;
                border: none;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
            }

            input[type="submit"]:hover {
                background: #219150;
            }

        </style>
    </head>
    <body>

        <div class="header">
            <h2 class="title">Future Matches</h2> 
        </div>


        <div class="container">
            <form action="FutureMatch" method="post">

                Match Date:<br>
                <input type="date" name="matchDate" required>

                Match Start Time:<br>
                <input type="time" name="matchTime" required>

                Match Team 1:<br>
                <input type="text" name="team1" required>

                Match Team 2:<br>
                <input type="text" name="team2" required>

                <input type="submit" value="Submit">

            </form>
        </div>

    </body>
</html>
