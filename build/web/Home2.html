<!DOCTYPE html>
<html>
    <head>
        <title>Login Error</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #f2f2f2;
                font-family: Arial;
            }

            .error-box {
                background: #ffffff;
                padding: 30px 40px;
                border-radius: 8px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            .error-box h2 {
                color: #e74c3c;
                margin-bottom: 20px;
            }

            .error-box a {
                text-decoration: none;
                color: #ffffff;
                background: #3498db;
                padding: 10px 20px;
                border-radius: 5px;
                font-size: 14px;
            }

            .error-box a:hover {
                background: #2980b9;
            }
        </style>
    </head>

    <body>
        <div class="error-box">
            <h2>Please Login First</h2>
            <a href="index.html">Home page</a>
        </div>
    </body>
</html>
